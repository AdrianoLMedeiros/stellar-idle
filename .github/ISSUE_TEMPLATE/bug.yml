name: Bug
description: Reportar um problema visual, técnico ou de gameplay.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema
      description: O que está acontecendo?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      description: O que deveria acontecer?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Abrir o jogo
        2. Ir para ...
        3. Observar ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto
      description: Browser, viewport, save, screenshot ou logs relevantes.
